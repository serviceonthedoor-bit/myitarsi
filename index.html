<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Itarsi | Live Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="site-header">
            <div class="site-title">🏙️ My Itarsi</div>
            <div class="tagline">📍 Hospitals · Schools · Auto Availability — live from Google Sheets</div>
        </div>

        <div class="search-section">
            <div class="search-icon">🔍</div>
            <input type="text" id="searchInput" class="search-input" placeholder="Search by name, specialty, or keyword...">
            <button id="clearSearchBtn" class="clear-search">✖ Clear</button>
        </div>

        <div class="category-tabs" id="categoryTabs">
            <button data-cat="all" class="cat-btn active"><span>🏥📚🚖</span> All</button>
            <button data-cat="hospital" class="cat-btn"><span>🏥</span> Hospitals</button>
            <button data-cat="school" class="cat-btn"><span>📚</span> Schools</button>
            <button data-cat="auto" class="cat-btn"><span>🚖</span> Auto Availability</button>
        </div>

        <div class="result-stats" id="resultStats">🔄 Loading data from Google Sheets...</div>
        <div id="cardsContainer" class="cards-grid"></div>
        
        <footer>
            🌿 My Itarsi — data synced live from Google Sheets | updated in real-time
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
