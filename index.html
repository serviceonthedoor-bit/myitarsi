<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Itarsi | Local Directory of Hospitals, Schools & Auto Services</title>
    <meta name="description" content="Complete directory of hospitals, schools, and auto services in Itarsi, Madhya Pradesh.">
    <meta name="copyright" content="My Itarsi Directory">
    
    <!-- Tailwind CSS + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        /* Card protection */
        .card, .card * {
            user-select: none !important;
            -webkit-user-select: none !important;
        }
        
        input, button {
            user-select: text !important;
        }
        
        .card {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .card::after {
            content: "© My Itarsi";
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 9px;
            color: rgba(0, 0, 0, 0.1);
            pointer-events: none;
            font-weight: 500;
        }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }
        
        .modal-close:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.1);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e7e6c;
            border-radius: 10px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        
        .skeleton {
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
        }
        @keyframes shine {
            to { background-position-x: -200%; }
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'itarsi-primary': '#0b5e4a',
                        'itarsi-secondary': '#1e7e6c',
                        'itarsi-accent': '#2c9c86',
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-teal-50 to-cyan-50">
    
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-emerald-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse delay-1000"></div>
    </div>

    <div class="container mx-auto px-4 py-8 max-w-7xl relative">
        
        <!-- Header -->
        <div class="text-center mb-8 animate-fade-in">
            <div class="inline-flex items-center justify-center mb-4">
                <div class="relative">
                    <div class="absolute inset-0 bg-gradient-to-r from-itarsi-primary to-itarsi-secondary rounded-2xl blur-xl opacity-50"></div>
                    <div class="relative bg-gradient-to-r from-itarsi-primary to-itarsi-secondary rounded-2xl p-4 shadow-2xl">
                        <div class="flex items-center gap-3">
                            <div class="text-4xl">🏙️</div>
                            <div>
                                <h1 class="text-3xl font-black text-white tracking-tight">My Itarsi</h1>
                                <p class="text-emerald-100 text-xs">Local Directory</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <p class="text-gray-600 mt-3 text-lg flex items-center justify-center gap-2">
                <i class="fas fa-map-marker-alt text-itarsi-primary"></i>
                Hospitals · Schools · Auto · Real Estate
            </p>
        </div>

        <!-- Search Bar -->
        <div class="max-w-3xl mx-auto mb-8 animate-fade-in">
            <div class="relative group">
                <div class="absolute inset-0 bg-gradient-to-r from-itarsi-primary to-itarsi-secondary rounded-2xl blur opacity-25 group-hover:opacity-40 transition duration-300"></div>
                <div class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    <div class="flex items-center p-2">
                        <i class="fas fa-search text-gray-400 ml-4 text-xl"></i>
                        <input type="text" id="searchInput" 
                               class="flex-1 p-4 outline-none text-gray-700 placeholder-gray-400 text-lg"
                               placeholder="Search hospitals, schools, auto services, or real estate..."
                               autocomplete="off">
                        <button id="refreshBtn" 
                                class="bg-itarsi-primary hover:bg-itarsi-secondary text-white px-5 py-2 rounded-xl transition duration-200 font-medium mx-1"
                                title="Refresh data">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <button id="clearSearchBtn" 
                                class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-6 py-2 rounded-xl transition duration-200 font-medium">
                            <i class="fas fa-times mr-2"></i>Clear
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="flex flex-wrap justify-center gap-3 mb-10">
            <button data-cat="all" class="cat-btn bg-itarsi-primary text-white px-6 py-3 rounded-full font-semibold shadow-lg transition-all duration-300 hover:scale-105 flex items-center gap-2">
                <i class="fas fa-th-large"></i> All
            </button>
            <button data-cat="hospital" class="cat-btn bg-white text-gray-700 hover:bg-red-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2">
                <i class="fas fa-hospital text-red-500"></i> Hospitals
            </button>
            <button data-cat="school" class="cat-btn bg-white text-gray-700 hover:bg-blue-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2">
                <i class="fas fa-graduation-cap text-blue-500"></i> Schools
            </button>
            <button data-cat="auto" class="cat-btn bg-white text-gray-700 hover:bg-green-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2">
                <i class="fas fa-car text-green-500"></i> Auto Services
            </button>
            <button data-cat="realestate" class="cat-btn bg-white text-gray-700 hover:bg-purple-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2">
                <i class="fas fa-building text-purple-500"></i> Real Estate
            </button>
        </div>

        <!-- Results Stats -->
        <div id="resultStats" class="text-center text-gray-500 mb-6 font-medium"></div>

        <!-- Cards Grid -->
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="skeleton h-64 rounded-2xl"></div>
            <div class="skeleton h-64 rounded-2xl hidden md:block"></div>
            <div class="skeleton h-64 rounded-2xl hidden lg:block"></div>
        </div>

        <!-- Footer -->
        <footer class="mt-16 pt-8 border-t border-gray-200 text-center">
            <p class="text-gray-500 text-sm">🌿 My Itarsi — connecting you with essential local services</p>
            <p class="text-gray-400 text-xs mt-2">© 2026 My Itarsi Directory | All Rights Reserved</p>
            <p class="text-gray-400 text-xs mt-1">Click on any card for more details</p>
        </footer>
    </div>

    <!-- Modal Popup -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">
                <i class="fas fa-times text-white text-sm"></i>
            </div>
            <div id="modalBody" class="p-6">
                <!-- Dynamic content will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // ========== COPY PROTECTION ==========
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'a')) {
                e.preventDefault();
                alert('📋 Content is protected.');
            }
            if (e.key === 'F12') e.preventDefault();
        });
        document.addEventListener('copy', e => { e.preventDefault(); alert('📋 Content is protected.'); });
        document.addEventListener('cut', e => { e.preventDefault(); alert('📋 Content is protected.'); });
        document.addEventListener('dragstart', e => e.preventDefault());
        
        // ========== CONFIGURATION ==========
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyI54-1K2KfJ_XF9opzuajfWJSnxlPXjxV6letT7z3syA8l6khIaypcAGNfqKp4aXmP/exec';
        const CACHE_KEY = 'myitarsi_data_v2';
        const CACHE_DURATION = 0;
        
        let placesData = [];
        let activeCategory = 'all';
        let searchQuery = '';
        let isLoading = false;
        
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const cardsContainer = document.getElementById('cardsContainer');
        const resultStats = document.getElementById('resultStats');
        const categoryBtns = document.querySelectorAll('.cat-btn');
        const modal = document.getElementById('detailModal');
        
        // Cache functions
        function getCachedData() {
    		return null;  // Always fetch fresh data from Google Sheets
	}
        
        function setCachedData(data) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({ data: data, timestamp: Date.now() }));
            } catch(e) {}
        }
        
        function clearCache() { localStorage.removeItem(CACHE_KEY); }
        
        // Modal functions
        function openModal(item) {
            const config = {
                hospital: { icon: 'fas fa-hospital', color: 'red', bg: 'bg-red-100', text: 'text-red-600' },
                school: { icon: 'fas fa-graduation-cap', color: 'blue', bg: 'bg-blue-100', text: 'text-blue-600' },
                auto: { icon: 'fas fa-car', color: 'green', bg: 'bg-green-100', text: 'text-green-600' },
                realestate: { icon: 'fas fa-building', color: 'purple', bg: 'bg-purple-100', text: 'text-purple-600' }
            };
            const c = config[item.category] || { icon: 'fas fa-building', color: 'gray', bg: 'bg-gray-100', text: 'text-gray-600' };
            
            const modalHTML = `
                <div class="text-center mb-4">
                    <div class="w-20 h-20 ${c.bg} rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="${c.icon} text-${c.color}-500 text-3xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">${escapeHtml(item.name)}</h2>
                    <span class="inline-block px-3 py-1 ${c.bg} ${c.text} text-xs rounded-full mt-2 uppercase">${escapeHtml(item.category)}</span>
                </div>
                
                <div class="space-y-3 border-t border-gray-100 pt-4">
                    ${item.address ? `
                        <div class="flex gap-3 items-start">
                            <i class="fas fa-map-marker-alt text-gray-400 mt-1"></i>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-500">Address</p>
                                <p class="text-gray-800">${escapeHtml(item.address)}</p>
                                <a href="https://maps.google.com/?q=${escapeHtml(item.address)}" target="_blank" class="text-itarsi-primary text-sm mt-1 inline-block">
                                    <i class="fas fa-external-link-alt mr-1"></i> Get Directions
                                </a>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${item.contact ? `
                        <div class="flex gap-3 items-start">
                            <i class="fas fa-phone-alt text-gray-400 mt-1"></i>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-500">Phone</p>
                                <p class="text-gray-800 font-mono">${escapeHtml(item.contact)}</p>
                                <a href="tel:${escapeHtml(item.contact)}" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm inline-block mt-2">
                                    <i class="fas fa-phone-alt mr-1"></i> Call Now
                                </a>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${item.extra ? `
                        <div class="flex gap-3 items-start">
                            <i class="fas fa-info-circle text-gray-400 mt-1"></i>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-500">Additional Info</p>
                                <p class="text-gray-800">${escapeHtml(item.extra)}</p>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${item.timings ? `
                        <div class="flex gap-3 items-start">
                            <i class="fas fa-clock text-gray-400 mt-1"></i>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-500">Timings</p>
                                <p class="text-gray-800">${escapeHtml(item.timings)}</p>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${item.website ? `
                        <div class="flex gap-3 items-start">
                            <i class="fas fa-globe text-gray-400 mt-1"></i>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-500">Website</p>
                                <a href="${escapeHtml(item.website)}" target="_blank" class="text-itarsi-primary text-sm break-all">
                                    ${escapeHtml(item.website)}
                                </a>
                            </div>
                        </div>
                    ` : ''}
                </div>

${item.email ? `
    <div class="flex gap-3 items-start">
        <i class="fas fa-envelope text-gray-400 mt-1"></i>
        <div class="flex-1">
            <p class="text-sm font-medium text-gray-500">Email</p>
            <a href="mailto:${escapeHtml(item.email)}" class="text-itarsi-primary text-sm break-all">
                ${escapeHtml(item.email)}
            </a>
        </div>
    </div>
` : ''}

            `;
            
            document.getElementById('modalBody').innerHTML = modalHTML;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        
        async function fetchDataFromSheets(forceRefresh = false) {
            if (isLoading) return;
            
            if (!forceRefresh) {
                const cached = getCachedData();
                if (cached && cached.length > 0) {
                    placesData = cached;
                    resultStats.innerHTML = `<i class="fas fa-database text-green-500 mr-2"></i> ${placesData.length} services`;
                    renderCards();
                    return;
                }
            }
            
            isLoading = true;
            if (refreshBtn) refreshBtn.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i>';
            
            try {
                resultStats.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Loading...';
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(APPS_SCRIPT_URL, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data[0] && data[0].error) throw new Error(data[0].error);
                placesData = data.filter(item => item.name && item.category);
                setCachedData(placesData);
                resultStats.innerHTML = `<i class="fas fa-check-circle text-green-500 mr-2"></i> ${placesData.length} services`;
                renderCards();
            } catch (error) {
                console.error(error);
                if (placesData.length === 0) loadFallbackData();
                resultStats.innerHTML = `<i class="fas fa-cloud-arrow-down text-gray-400 mr-2"></i> ${placesData.length} services`;
                renderCards();
            } finally {
                isLoading = false;
                if (refreshBtn) setTimeout(() => refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i>', 1000);
            }
        }
        
        function loadFallbackData() {
            placesData = [
                { name: "Itarsi District Hospital", category: "hospital", address: "Civil Lines, Itarsi", contact: "07572 241001", extra: "24/7 Emergency", timings: "24x7", website: "" },
                { name: "City Hospital", category: "hospital", address: "Junnardeo Road", contact: "07572 245678", extra: "Multi-speciality", timings: "24x7", website: "" },
                { name: "Delhi Public School", category: "school", address: "Junnardeo Road", contact: "07572 288101", extra: "CBSE Curriculum", timings: "8am-2pm", website: "" },
                { name: "St. Mary's Convent", category: "school", address: "Civil Lines", contact: "07572 241234", extra: "ICSE Board", timings: "8am-2pm", website: "" },
                { name: "City Auto Service", category: "auto", address: "Railway Station", contact: "99778 66552", extra: "24x7 Available", timings: "24x7", website: "" },
                { name: "Sharma Real Estate", category: "realestate", address: "Main Road", contact: "9988776655", extra: "20+ years experience", timings: "10am-7pm", website: "" }
            ];
        }
        
        function renderCards() {
            let filtered = placesData.filter(item => {
                let itemCategory = (item.category || '').toLowerCase().trim();
                let activeCat = activeCategory.toLowerCase();
                if (activeCat !== 'all' && itemCategory !== activeCat) return false;
                if (searchQuery.trim()) {
                    const query = searchQuery.toLowerCase();
                    return (item.name || '').toLowerCase().includes(query) ||
                           (item.address || '').toLowerCase().includes(query) ||
                           (item.contact || '').toLowerCase().includes(query) ||
                           (item.extra || '').toLowerCase().includes(query);
                }
                return true;
            });
            
            const categoryNames = { all: 'services', hospital: 'hospitals', school: 'schools', auto: 'auto services', realestate: 'real estate' };
            resultStats.innerHTML = filtered.length === 0 ? 'No results found' : `Showing ${filtered.length} ${categoryNames[activeCategory]}`;
            
            if (filtered.length === 0) {
                cardsContainer.innerHTML = `<div class="col-span-full text-center py-16"><i class="fas fa-search text-6xl text-gray-300 mb-4"></i><p class="text-gray-500">No results found.</p></div>`;
                return;
            }
            
            cardsContainer.innerHTML = filtered.map((item, index) => {
                const config = {
                    hospital: { icon: 'fas fa-hospital', color: 'red', bg: 'bg-red-50' },
                    school: { icon: 'fas fa-graduation-cap', color: 'blue', bg: 'bg-blue-50' },
                    auto: { icon: 'fas fa-car', color: 'green', bg: 'bg-green-50' },
                    realestate: { icon: 'fas fa-building', color: 'purple', bg: 'bg-purple-50' }
                };
                const c = config[item.category] || { icon: 'fas fa-building', color: 'gray', bg: 'bg-gray-50' };
                
                return `
                    <div class="card bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 animate-fade-in" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
                        <div class="h-2 bg-gradient-to-r from-${c.color}-400 to-${c.color}-600"></div>
                        <div class="p-6">
                            <div class="flex items-center gap-3 mb-3">
                                <div class="w-12 h-12 ${c.bg} rounded-xl flex items-center justify-center">
                                    <i class="${c.icon} text-${c.color}-500 text-xl"></i>
                                </div>
                                <h3 class="font-bold text-xl text-gray-800">${escapeHtml(item.name)}</h3>
                            </div>
                            <div class="space-y-2 text-gray-600 text-sm">
                                ${item.address ? `<div class="flex gap-2"><i class="fas fa-map-marker-alt text-${c.color}-500 mt-0.5"></i> <span>${escapeHtml(item.address)}</span></div>` : ''}
                                ${item.contact ? `<div class="flex gap-2"><i class="fas fa-phone-alt text-${c.color}-500 mt-0.5"></i> <span class="font-mono">${escapeHtml(item.contact)}</span></div>` : ''}
                                ${item.extra ? `<div class="flex gap-2"><i class="fas fa-info-circle text-${c.color}-500 mt-0.5"></i> <span>${escapeHtml(item.extra)}</span></div>` : ''}
                            </div>
                            <div class="mt-3 text-xs text-itarsi-primary">
                                <i class="fas fa-hand-pointer mr-1"></i> Click for details
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        function setActiveCategory(category) {
            activeCategory = category;
            categoryBtns.forEach(btn => {
                const btnCat = btn.getAttribute('data-cat');
                if (btnCat === category) {
                    btn.className = 'bg-itarsi-primary text-white px-6 py-3 rounded-full font-semibold shadow-lg transition-all duration-300 hover:scale-105 flex items-center gap-2';
                } else {
                    if (btnCat === 'hospital') btn.className = 'bg-white text-gray-700 hover:bg-red-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2';
                    else if (btnCat === 'school') btn.className = 'bg-white text-gray-700 hover:bg-blue-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2';
                    else if (btnCat === 'auto') btn.className = 'bg-white text-gray-700 hover:bg-green-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2';
                    else if (btnCat === 'realestate') btn.className = 'bg-white text-gray-700 hover:bg-purple-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2';
                    else btn.className = 'bg-white text-gray-700 hover:bg-gray-50 px-6 py-3 rounded-full font-semibold shadow-md transition-all duration-300 hover:scale-105 flex items-center gap-2';
                }
            });
            renderCards();
        }
        
        categoryBtns.forEach(btn => btn.addEventListener('click', () => setActiveCategory(btn.getAttribute('data-cat'))));
        
        let searchTimeout;
        searchInput.addEventListener('input', e => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { searchQuery = e.target.value; renderCards(); }, 300);
        });
        
        clearBtn.addEventListener('click', () => { searchInput.value = ''; searchQuery = ''; renderCards(); });
        refreshBtn.addEventListener('click', () => { clearCache(); fetchDataFromSheets(true); });
        
        fetchDataFromSheets();
        
        // Close modal with Escape key
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
